  <title>课语｜课后反馈助手</title>
  <style>

    .topbar{height:76px;display:flex;align-items:center;padding:0 max(28px,calc((100vw - 1320px)/2));border-bottom:1px solid rgba(49,95,76,.15);background:rgba(245,241,232,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}.brand-mark{width:38px;height:38px;border-radius:50% 50% 50% 12px;background:var(--green);color:white;display:grid;place-items:center;font-family:serif;font-size:19px;margin-right:10px}.brand-copy{display:flex;flex-direction:column;line-height:1.1}.brand-copy strong{font-family:serif;font-size:18px;letter-spacing:.2em}.brand-copy span{color:var(--muted);font-size:10px;margin-top:5px;letter-spacing:.18em}.tabs{margin-left:auto;display:flex;gap:8px}.tabs button{border:0;background:transparent;color:#69736e;padding:9px 16px;border-radius:999px;font-weight:500}.tabs button.active{color:white;background:var(--green);box-shadow:0 5px 16px rgba(49,95,76,.18)}.tabs i{font-style:normal;font-size:10px;margin-left:4px;opacity:.75}
    .workspace{width:100%;max-width:1320px;height:calc(100vh - 120px);padding:24px 28px 18px;margin:auto}.history-page{max-width:900px;padding:58px 28px 90px;margin:auto}.eyebrow{color:var(--orange);letter-spacing:.18em;font-size:11px;font-weight:700}h1{font-family:serif;font-size:42px;line-height:1.35;margin:12px 0 0;letter-spacing:.02em}.editor-grid{display:grid;grid-template-columns:minmax(0,1.18fr) minmax(360px,.82fr);gap:28px;align-items:stretch;height:100%;min-height:0}.form-card,.preview-card{background:rgba(255,254,250,.72);border:1px solid rgba(124,127,116,.2);box-shadow:0 18px 55px rgba(51,56,49,.06)}.form-card{height:100%;min-height:0;padding:36px;border-radius:5px 28px 5px 28px;overflow-y:auto;overscroll-behavior:contain;scrollbar-gutter:stable}.section-heading{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}.section-heading>div{display:flex;align-items:center;gap:11px}.section-heading span{width:30px;height:30px;display:grid;place-items:center;border-radius:50%;border:1px solid #9eb2a7;color:var(--green);font-size:11px}h2{font-family:serif;font-size:19px;margin:0}.text-button{border:0;background:transparent;color:var(--muted);font-size:12px}.subheading{margin:38px 0 24px;padding-top:32px;border-top:1px dashed var(--line)}label{display:block;font-size:13px;font-weight:600;margin:0 0 9px}label em{color:var(--muted);font-size:10px;font-style:normal;font-weight:400;margin-left:5px}input,textarea,select{width:100%;border:1px solid var(--line);background:#fffefa;color:var(--ink);border-radius:10px;padding:13px 14px;outline:none;transition:.2s}input:focus,textarea:focus,select:focus{border-color:#789886;box-shadow:0 0 0 3px rgba(49,95,76,.08)}textarea{resize:vertical;min-height:82px;line-height:1.7}.two-columns{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:23px}.basic-extra{max-width:calc(50% - 8px);margin-bottom:20px}.input-with-action{display:grid;grid-template-columns:1fr auto;gap:7px}.input-with-action button{border:1px solid var(--line);background:var(--green2);color:var(--green);border-radius:9px;padding:0 12px}.field-label{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}.field-label label{margin:0}.field-label span{color:var(--muted);font-size:10px}.chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:24px}.chips button{border:1px solid var(--line);background:#fffefa;border-radius:999px;padding:9px 19px;color:#69736e}.chips button.selected,.option-grid button.selected{background:var(--green2);color:var(--green);border-color:#789886;font-weight:600;box-shadow:inset 0 0 0 1px rgba(49,95,76,.05)}.option-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:12px}.option-grid button{min-height:42px;border:1px solid var(--line);background:#fffefa;border-radius:10px;padding:9px 7px;color:#69736e;font-size:12px}.custom-note{margin:11px 0 20px}.custom-note textarea{min-height:68px}.ability{padding:14px 0 18px}.ability-head{display:flex;align-items:center;justify-content:space-between}.ability-head label{margin:0}.ability-head span{max-width:70%;font-size:11px;color:var(--green);text-align:right;line-height:1.55}.scale{display:grid;grid-template-columns:repeat(10,1fr);gap:7px;margin-top:11px}.scale button{border:1px solid var(--line);background:#fffefa;color:#9ca39e;height:34px;border-radius:7px;font-size:12px}.scale button.filled{background:var(--green);border-color:var(--green);color:white}
    .preview-card{height:100%;min-height:0;border-radius:28px 5px 28px 5px;padding:22px;display:flex;flex-direction:column;overflow:hidden}.preview-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);padding:2px 3px 17px}.preview-top>div{color:var(--green);font-weight:600}.live-dot{display:inline-block;width:7px;height:7px;background:#5b9d79;border-radius:50%;margin-right:7px;box-shadow:0 0 0 4px rgba(91,157,121,.13)}.paper{background:var(--paper);flex:1;min-height:0;padding:42px 38px;box-shadow:0 8px 25px rgba(57,55,47,.08);border:1px solid #ece7da;position:relative;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain}.paper:after{content:"课语";position:absolute;right:-8px;bottom:-16px;font-family:serif;font-size:76px;color:rgba(49,95,76,.035);transform:rotate(-10deg)}.preview-editor{width:100%;height:calc(100% - 38px);min-height:360px;padding:0;border:0;border-radius:0;background:transparent;color:#505b55;line-height:2;font-size:13px;resize:none;position:relative;z-index:1}.preview-editor:focus{border:0;box-shadow:none}.preview-editor::placeholder{color:#a1a7a3}.signature{color:#9a9d94;font-family:serif;font-size:12px;text-align:right;margin-top:34px;position:relative;z-index:1}.paper.is-empty{display:block}.actions{display:grid;grid-template-columns:.85fr 1.15fr;gap:10px;margin-top:18px}.actions button{height:46px;border-radius:10px;font-weight:600}.secondary{border:1px solid #9db0a4;color:var(--green);background:transparent}.primary{border:1px solid var(--green);color:white;background:var(--green);box-shadow:0 8px 20px rgba(49,95,76,.16)}button:disabled{opacity:.4;cursor:not-allowed}.privacy{text-align:center;margin:13px 0 0;color:#979e99;font-size:10px}.form-message{min-height:16px;text-align:center;margin:11px 0 0;color:var(--orange);font-size:11px}.history-page>p{color:var(--muted);margin:10px 0 32px}.empty{padding:70px 24px;display:flex;flex-direction:column;align-items:center;background:rgba(255,254,250,.65);border:1px dashed #bbc3bc;border-radius:18px}.empty b{font-family:serif;font-size:20px}.empty span{color:var(--muted);margin:10px 0 24px;font-size:13px}.empty button{background:var(--green);color:#fff;border:0;padding:11px 22px;border-radius:999px}.record-list{display:flex;flex-direction:column;gap:12px}.record-item{width:100%;text-align:left;display:grid;grid-template-columns:48px 1fr auto;gap:15px;align-items:center;padding:18px;border:1px solid var(--line);border-radius:14px;background:#fffefa;color:var(--ink)}.record-avatar{width:44px;height:44px;border-radius:50%;background:var(--green2);color:var(--green);display:grid;place-items:center;font-family:serif;font-size:18px}.record-item b,.record-item span,.record-item p{display:block}.record-item span{color:var(--muted);font-size:11px;margin:4px 0 6px}.record-item p{margin:0;color:#65706a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:520px}.record-item i{font-style:normal;color:var(--green);font-size:12px}.site-footer{max-width:1320px;margin:0 auto;padding:0 28px 28px;text-align:center;color:#8d958f;font-size:11px}.site-footer a{color:var(--green);text-decoration:none}.site-footer a:hover{text-decoration:underline}
    @media(max-width:850px){.workspace,.history-page{width:auto;height:auto;padding:34px 16px 70px}h1{font-size:32px}.editor-grid{grid-template-columns:1fr;height:auto}.preview-card{height:auto;overflow:visible}.form-card{height:auto;padding:24px 18px;overflow:visible}.paper{min-height:480px;overflow:visible}.preview-editor{height:390px;min-height:390px}.option-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.site-footer{padding:0 16px 24px;line-height:1.7}}@media(max-width:560px){.topbar{padding:0 14px}.brand-copy span{display:none}.tabs button{padding:8px 10px;font-size:12px}.two-columns{grid-template-columns:1fr}.basic-extra{max-width:none}.option-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.scale{grid-template-columns:repeat(5,1fr)}.ability-head span{max-width:62%}.paper{padding:32px 25px;min-height:430px}.record-item{grid-template-columns:42px 1fr}.record-item i{display:none}}

<body>
  <header class="topbar"><div class="brand-mark">课</div><div class="brand-copy"><strong>课语</strong><span>课后反馈助手</span></div><nav class="tabs" aria-label="主导航"><button type="button" class="active" data-tab="create">写反馈</button><button type="button" data-tab="history">历史记录 <i id="record-count">0</i></button></nav></header>
  <main>
    <section id="create-page" class="workspace">
      <div class="editor-grid">
        <section class="form-card">
          <div class="section-heading"><div><span>01</span><h2>基本信息</h2></div><button type="button" id="reset-button" class="text-button">清空全部</button></div>
          <div class="two-columns"><label>上课日期 <em>选填</em><div class="input-with-action"><input id="date" type="date"><button type="button" id="today-button">今天</button></div></label><label>学生姓名 <em>选填</em><input id="student" placeholder="请输入学生姓名" autocomplete="off"></label></div>
          <label class="basic-extra">年级 <em>选填</em><select id="grade"><option value="">请选择年级</option><option>一年级</option><option>二年级</option><option>三年级</option><option>四年级</option><option>五年级</option><option>预初</option><option>初一</option><option>初二</option><option>初三</option><option>高一</option><option>高二</option><option>高三</option><option>其他</option></select></label>
          <div class="field-label"><label>学习科目</label><span>单选，可再次点击取消</span></div><div id="subjects" class="chips" role="group" aria-label="学习科目"></div>
          <label>本节课学习内容 <em>选填</em><textarea id="content" rows="3" placeholder="例如：分数的加减法、通分方法与典型例题……"></textarea></label>
          <div class="section-heading subheading"><div><span>02</span><h2>学习结果</h2></div></div>
          <div class="field-label"><label>课堂状态</label><span>可多选</span></div><div id="statuses" class="option-grid"></div>
          <label class="custom-note">课堂状态补充 <em>选填</em><textarea id="study-status-note" rows="2" placeholder="也可以直接填写今天的课堂状态……"></textarea></label>
          <div class="field-label"><label>知识掌握程度</label><span>可多选</span></div><div id="mastery" class="option-grid"></div>
          <label class="custom-note">知识掌握补充 <em>选填</em><textarea id="mastery-note" rows="2" placeholder="也可以直接填写知识掌握情况……"></textarea></label>
          <div class="ability"><div class="ability-head"><label>吸收度</label><span id="absorption-text">可不选</span></div><div id="absorption-scale" class="scale" role="group" aria-label="吸收度"></div></div>
          <label class="custom-note">吸收度补充 <em>选填</em><textarea id="absorption-note" rows="2" placeholder="补充学生理解和吸收信息的表现……"></textarea></label>
          <div class="ability"><div class="ability-head"><label>输出度</label><span id="output-text">可不选</span></div><div id="output-scale" class="scale" role="group" aria-label="输出度"></div></div>
          <label class="custom-note">输出度补充 <em>选填</em><textarea id="output-note" rows="2" placeholder="补充学生表达、讲解或展示的表现……"></textarea></label>
          <div class="section-heading subheading"><div><span>03</span><h2>课堂观察</h2></div></div>
          <div class="field-label"><label>具体表现</label><span>可多选</span></div><div id="observations" class="option-grid"></div>
          <label class="custom-note">具体表现补充 <em>选填</em><textarea id="observation-note" rows="2" placeholder="填写选项之外的具体课堂表现……"></textarea></label>
          <label>课堂亮点或补充记录 <em>选填</em><textarea id="highlights" rows="3" placeholder="记录一件只属于这个孩子的具体表现……"></textarea></label>
          <div class="field-label"><label>需要关注的问题</label><span>可多选</span></div><div id="challenges" class="option-grid"></div>
          <label class="custom-note">关注问题补充 <em>选填</em><textarea id="challenge-note" rows="2" placeholder="填写还需要关注的其他问题……"></textarea></label>
          <div class="section-heading subheading"><div><span>04</span><h2>针对性建议</h2></div></div>
          <div class="field-label"><label>今天的建议</label><span>可多选，也可不选</span></div><div id="suggestions" class="option-grid"></div>
          <label class="custom-note">针对性建议补充 <em>选填</em><textarea id="suggestion-note" rows="2" placeholder="也可以直接填写今天的建议……"></textarea></label>
          <div class="section-heading subheading"><div><span>05</span><h2>课后作业</h2></div></div>
          <label>作业内容 <em>选填</em><textarea id="homework" rows="3" placeholder="例如：练习册第 18—19 页；背诵课文第三段……"></textarea></label>
          <div class="field-label"><label>完成标准</label><span>可多选</span></div><div id="homework-standards" class="option-grid"></div>
          <div class="field-label"><label>完成时间</label><span>单选</span></div><div id="deadlines" class="option-grid"></div>
          <div class="section-heading subheading"><div><span>06</span><h2>下一步安排</h2></div></div>
          <div class="field-label"><label>家长配合建议</label><span>可多选</span></div><div id="parent-support" class="option-grid"></div>
          <div class="field-label"><label>下节课计划</label><span>单选</span></div><div id="next-plans" class="option-grid"></div>
          <div class="field-label"><label>老师后续跟进</label><span>单选</span></div><div id="followups" class="option-grid"></div>
          <label class="custom-note">下一步安排补充 <em>选填</em><textarea id="next-step-note" rows="2" placeholder="不选上面的选项，也可以直接填写下一步安排……"></textarea></label>
        </section>
        <aside class="preview-card"><div class="preview-top"><div><span class="live-dot"></span>实时预览 · 可直接修改</div><span id="char-count">0 字</span></div><div id="paper" class="paper is-empty"><textarea id="preview-editor" class="preview-editor" aria-label="可编辑的实时预览" placeholder="从左侧任选一项，评语会在这里出现；也可以直接在这里输入或修改。"></textarea><div id="signature" class="signature hidden">— 认真记录每一次进步</div></div><div class="actions"><button type="button" id="save-button" class="secondary" disabled>保存记录</button><button type="button" id="copy-button" class="primary" disabled>复制完整反馈</button></div><p id="form-message" class="form-message" aria-live="polite"></p><p class="privacy">右侧文字可直接修改；左侧内容变化后会重新生成</p></aside>
      </div>
    </section>
    <section id="history-page" class="history-page hidden"><span class="eyebrow">SAVED NOTES</span><h1>历史反馈</h1><p>点击一条记录即可重新载入并继续编辑。</p><div id="history-content"></div></section>
  </main>
  <footer class="site-footer">本网站版权归小黄老师所有 · 如有问题请联系：<a href="mailto:huang030225@gmail.com">huang030225@gmail.com</a></footer>
  <script>
  (()=>{
    const subjects=["数学","语文","英语","物理","化学","生物","历史","地理","道法","其他"];
    const choices=(labels,texts)=>labels.map((label,i)=>({label,text:texts[i]}));
    const statuses=choices(["高度专注","积极主动","稳定投入","慢热渐入","略显疲惫","容易分心","需要鼓励","情绪波动"],["课堂状态：全程保持高度专注，能够持续跟随教学节奏完成学习任务。","课堂状态：参与意愿强，能够主动回应问题并推动课堂互动。","课堂状态：整体平稳投入，听讲、思考和练习衔接自然。","课堂状态：前段进入状态稍慢，经过引导后逐步投入并跟上节奏。","课堂状态：精神状态略显疲惫，但在提醒后仍能配合完成主要任务。","课堂状态：专注保持时间较短，学习过程中需要适时提醒和任务切分。","课堂状态：面对任务时信心不足，在肯定和鼓励后表现有所提升。","课堂状态：情绪对学习投入产生一定影响，需要先稳定状态再推进任务。"]);
    const mastery=choices(["熟练掌握","掌握良好","基本掌握","部分理解","需要巩固","需要重讲"],["掌握情况：能够准确、独立地运用本节课知识解决问题，并能说明思路。","掌握情况：核心内容理解较好，大部分任务可以独立完成。","掌握情况：已理解主要知识点，在少量提示下能够完成对应练习。","掌握情况：对部分内容已有认识，但知识之间的联系还需要继续梳理。","掌握情况：当前理解还不稳定，需要通过复习和同类练习加深记忆。","掌握情况：关键概念仍存在卡点，后续需要放慢节奏重新讲解。"]);
    const absorptionTexts=["暂时难以跟随当前讲解，需要从更基础的概念开始重新建立理解。","能够捕捉少量信息，但需要多次重复和非常具体的示范。","对直观内容有所反应，遇到连续步骤时容易中断理解。","在分步骤提示下能够理解基础内容，独立衔接仍需练习。","基本能跟上常规讲解，重点和难点需要再次确认。","能够理解大部分课堂信息，偶尔需要补充例子帮助消化。","接收较顺畅，能够抓住重点并及时完成对应任务。","理解速度较快，能够主动联系已有知识进行吸收。","反应敏捷，能迅速识别关键信息并迁移到新问题中。","理解非常高效，能够准确提炼核心并形成自己的知识结构。"];
    const outputTexts=["暂时难以说出自己的想法，需要通过选择、跟读或示范带动表达。","愿意进行简单回应，但完整表达仍需要老师逐句引导。","能够说出零散要点，观点之间的连接还不够清晰。","在问题提示下可以完成基础表达，语言组织需要继续训练。","能够说明基本答案，但理由、步骤或细节还不够完整。","大部分时候能清楚表达，复杂内容需要短暂整理后输出。","表达较有条理，能够说明主要思路并回应追问。","输出完整清晰，能够使用恰当的学科语言说明过程。","表达准确且有逻辑，能够比较不同方法并主动补充细节。","能够高质量地讲解、总结和迁移，输出具有很强的完整性与启发性。"];
    const observations=choices(["主动回答","主动提问","独立完成","讲题清楚","笔记完整","改错及时","合作积极","坚持完成"],["主动回答问题，课堂参与积极","遇到疑问能够及时提出并寻求澄清","能够独立完成课堂任务","讲解思路较清楚，步骤表达有条理","课堂笔记记录完整，重点意识较好","发现错误后能够及时订正并回顾原因","合作任务中愿意倾听并积极参与","遇到困难时仍能坚持尝试并完成任务"]);
    const challenges=choices(["基础不牢","方法不熟","审题不细","计算粗心","速度偏慢","专注波动","表达不足","信心不足"],["需要关注：部分基础知识还不够牢固，影响了新内容的衔接。","需要关注：已经理解基本思路，但解题或操作方法还不够熟练。","需要关注：容易遗漏题目中的关键信息，需要建立圈画和复核习惯。","需要关注：思路基本正确，但计算和书写细节容易出现失误。","需要关注：完成任务的速度偏慢，需要提升熟练度并学会分配时间。","需要关注：专注状态存在波动，连续任务中容易出现信息遗漏。","需要关注：知道答案但不容易完整说出过程，需要增加口头复述训练。","需要关注：面对不确定任务时容易否定自己，需要通过小目标积累成功体验。"]);
    const suggestions=choices(["复习基础","整理错题","针对练习","口头复述"],["建议先用 10 分钟回顾课堂笔记和核心概念，确保基础内容理解准确。","建议把今天的错题按“错因—正确方法—再次尝试”整理并独立重做。","建议选择 3—5 道同类型题进行针对练习，重点观察方法是否真正掌握。","建议让孩子用自己的话讲一遍今天的知识或解题过程，以讲促学。"]);
    const standards=choices(["独立完成","书写规范","完成复查","订正错题"],["尽量独立完成，遇到不会的内容先做好标记","保持步骤完整、书写清楚","完成后自行检查一遍再提交","错误内容需要订正并说明原因"]);
    const deadlines=choices(["今晚完成","明晚前完成","三天内完成","下次课前"],["作业时间：建议今晚完成。","作业时间：请在明晚前完成。","作业时间：请在三天内分次完成。","作业时间：请在下次课前完成并准备检查。"]);
    const parentSupport=choices(["给予鼓励","检查完成","计时练习","听孩子讲"],["家长配合：完成后给予具体肯定，重点表扬坚持、方法或进步。","家长配合：只需确认任务是否完成，不必直接讲答案或代替订正。","家长配合：可帮助记录练习用时，让孩子逐步建立时间意识。","家长配合：请用几分钟听孩子复述知识点，通过追问帮助其整理思路。"]);
    const nextPlans=choices(["巩固基础","讲解错题","提升应用","进入新课"],["下节课计划：复查本节基础知识，并处理仍不稳定的关键点。","下节课计划：结合本次错题分析原因，强化正确方法和检查习惯。","下节课计划：在掌握基础后增加变式和应用任务，训练知识迁移。","下节课计划：简要复习后进入新内容，并关注新旧知识的衔接。"]);
    const followups=choices(["检查作业","重新讲解","持续观察","调整计划"],["老师后续会检查作业完成情况并反馈订正结果。","老师后续会针对当前卡点换一种方式重新讲解。","老师后续会继续观察课堂状态和学习习惯的变化。","老师后续会根据练习结果调整学习节奏和任务难度。"]);
    const emptyState=()=>({subject:"",studyStatus:[],mastery:[],absorption:null,output:null,observations:[],challenges:[],suggestions:[],homeworkStandards:[],deadline:"",parentSupport:[],nextPlan:"",teacherFollowup:""});
    let state=emptyState(),records=loadRecords(),previewOverride=null;const el=id=>document.getElementById(id),storageKey="class-feedback-records";
    function today(){const d=new Date(),offset=d.getTimezoneOffset()*60000;return new Date(d-offset).toISOString().slice(0,10)}
    function formatDate(value){if(!value)return"";const[y,m,d]=value.split("-");return`${y}年${Number(m)}月${Number(d)}日`}
    function textFor(options,value){return options.find(option=>option.label===value)?.text||""}function textsFor(options,values){return values.map(value=>textFor(options,value)).filter(Boolean)}function groupedChoiceText(options,values){return textsFor(options,values).map(text=>text.replace(/^[^：]+：/,"").replace(/[。；]+$/,"")).join("；")}function list(value){return Array.isArray(value)?value.filter(item=>typeof item==="string"):typeof value==="string"&&value?[value]:[]}
    function formData(){return{date:el("date").value,student:el("student").value,grade:el("grade").value,subject:state.subject,content:el("content").value,studyStatus:state.studyStatus,studyStatusNote:el("study-status-note").value,mastery:state.mastery,masteryNote:el("mastery-note").value,absorption:state.absorption,absorptionNote:el("absorption-note").value,output:state.output,outputNote:el("output-note").value,observations:state.observations,observationNote:el("observation-note").value,highlights:el("highlights").value,challenges:state.challenges,challengeNote:el("challenge-note").value,suggestions:state.suggestions,suggestionNote:el("suggestion-note").value,homework:el("homework").value,homeworkStandards:state.homeworkStandards,deadline:state.deadline,parentSupport:state.parentSupport,nextPlan:state.nextPlan,teacherFollowup:state.teacherFollowup,nextStepNote:el("next-step-note").value}}
    function buildFeedback(f){const sections=[];if(f.student.trim())sections.push(`【${f.student.trim()}同学课后反馈】`);else if(f.subject)sections.push(`【${f.subject}课后反馈】`);if(f.date)sections.push(`上课日期：${formatDate(f.date)}`);if(f.grade)sections.push(`年级：${f.grade}`);if(f.subject)sections.push(`学习科目：${f.subject}`);if(f.content.trim())sections.push(`本节课学习内容：${f.content.trim()}`);if(f.studyStatus.length)sections.push(`课堂状态：${groupedChoiceText(statuses,f.studyStatus)}。`);if(f.studyStatusNote.trim())sections.push(`课堂状态补充：${f.studyStatusNote.trim()}`);if(f.mastery.length)sections.push(`知识掌握度：${groupedChoiceText(mastery,f.mastery)}。`);if(f.masteryNote.trim())sections.push(`知识掌握补充：${f.masteryNote.trim()}`);const absorbed=[f.absorption?`吸收度：${absorptionTexts[f.absorption-1]}`:"",f.absorptionNote.trim()?`吸收度补充：${f.absorptionNote.trim()}`:""].filter(Boolean);if(absorbed.length)sections.push(absorbed.join("\n"));const output=[f.output?`输出度：${outputTexts[f.output-1]}`:"",f.outputNote.trim()?`输出度补充：${f.outputNote.trim()}`:""].filter(Boolean);if(output.length)sections.push(output.join("\n"));if(f.observations.length)sections.push(`课堂观察：${groupedChoiceText(observations,f.observations)}。`);if(f.observationNote.trim())sections.push(`具体表现补充：${f.observationNote.trim()}`);if(f.highlights.trim())sections.push(`补充记录：${f.highlights.trim()}`);if(f.challenges.length)sections.push(`需要关注：${groupedChoiceText(challenges,f.challenges)}。`);if(f.challengeNote.trim())sections.push(`需要关注的问题补充：${f.challengeNote.trim()}`);if(f.suggestions.length)sections.push(`针对性建议：${groupedChoiceText(suggestions,f.suggestions)}。`);if(f.suggestionNote.trim())sections.push(`针对性建议补充：${f.suggestionNote.trim()}`);if(f.homework.trim())sections.push(`课后作业：${f.homework.trim()}`);if(f.homeworkStandards.length)sections.push(`完成要求：${groupedChoiceText(standards,f.homeworkStandards)}。`);const deadline=textFor(deadlines,f.deadline);if(deadline)sections.push(deadline);if(f.parentSupport.length)sections.push(`家长配合：${groupedChoiceText(parentSupport,f.parentSupport)}。`);const next=textFor(nextPlans,f.nextPlan);if(next)sections.push(next);const follow=textFor(followups,f.teacherFollowup);if(follow)sections.push(follow);if(f.nextStepNote.trim())sections.push(`下一步安排补充：${f.nextStepNote.trim()}`);return sections.join("\n\n")}
    function loadRecords(){try{return JSON.parse(localStorage.getItem(storageKey)||"[]").map(normalize)}catch{return[]}}function normalize(r){const saved=r&&typeof r==="object"?r:{};const savedChallenges=list(saved.challenges);return{date:"",student:"",grade:"",content:"",studyStatusNote:"",masteryNote:"",absorptionNote:"",outputNote:"",observationNote:"",highlights:"",challengeNote:"",suggestionNote:"",homework:"",nextStepNote:"",...emptyState(),...saved,studyStatus:list(saved.studyStatus),mastery:list(saved.mastery),absorption:typeof saved.absorption==="number"?saved.absorption:typeof saved.reception==="number"?saved.reception:null,output:typeof saved.output==="number"?saved.output:typeof saved.expression==="number"?saved.expression:null,observations:list(saved.observations),challenges:savedChallenges.length?savedChallenges:list(saved.challenge),suggestions:list(saved.suggestions),homeworkStandards:list(saved.homeworkStandards),parentSupport:list(saved.parentSupport),id:saved.id||Date.now(),createdAt:saved.createdAt||new Date().toISOString()}}
    function button(label,selected,action){const b=document.createElement("button");b.type="button";b.textContent=label;b.className=selected?"selected":"";b.setAttribute("aria-pressed",String(selected));b.addEventListener("click",action);return b}
    function renderSingle(id,options,key){el(id).replaceChildren(...options.map(option=>button(option.label,state[key]===option.label,()=>{previewOverride=null;state[key]=state[key]===option.label?"":option.label;renderAll()})))}
    function renderMulti(id,options,key){el(id).replaceChildren(...options.map(option=>button(option.label,state[key].includes(option.label),()=>{previewOverride=null;state[key]=state[key].includes(option.label)?state[key].filter(v=>v!==option.label):[...state[key],option.label];renderAll()})))}
    function renderScale(id,key,texts,label){el(id).replaceChildren(...Array.from({length:10},(_,i)=>i+1).map(score=>{const b=button(String(score),Boolean(state[key]&&score<=state[key]),()=>{previewOverride=null;state[key]=state[key]===score?null:score;renderAll()});b.setAttribute("aria-label",`${label} ${score}档`);return b}));el(`${key}-text`).textContent=state[key]?texts[state[key]-1]:"可不选"}
    function renderAll(){el("subjects").replaceChildren(...subjects.map(subject=>button(subject,state.subject===subject,()=>{previewOverride=null;state.subject=state.subject===subject?"":subject;renderAll()})));renderMulti("statuses",statuses,"studyStatus");renderMulti("mastery",mastery,"mastery");renderScale("absorption-scale","absorption",absorptionTexts,"吸收度");renderScale("output-scale","output",outputTexts,"输出度");renderMulti("observations",observations,"observations");renderMulti("challenges",challenges,"challenges");renderMulti("suggestions",suggestions,"suggestions");renderMulti("homework-standards",standards,"homeworkStandards");renderSingle("deadlines",deadlines,"deadline");renderMulti("parent-support",parentSupport,"parentSupport");renderSingle("next-plans",nextPlans,"nextPlan");renderSingle("followups",followups,"teacherFollowup");updatePreview()}
    function syncPreview(text){const has=Boolean(text);el("char-count").textContent=`${text.length} 字`;el("paper").classList.toggle("is-empty",!has);el("signature").classList.toggle("hidden",!has);el("save-button").disabled=!has;el("copy-button").disabled=!has}function updatePreview(){const generated=buildFeedback(formData()),text=previewOverride===null?generated:previewOverride;el("preview-editor").value=text;syncPreview(text)}
    function notify(message){el("form-message").textContent=message;clearTimeout(notify.timer);notify.timer=setTimeout(()=>el("form-message").textContent="",1800)}
    function save(){const f=formData(),feedback=el("preview-editor").value;if(!feedback)return notify("请至少选择或填写一项内容");records=[{...f,editedFeedback:feedback,id:Date.now(),createdAt:new Date().toISOString()},...records].slice(0,30);localStorage.setItem(storageKey,JSON.stringify(records));renderHistory();notify("已保存到当前设备 ✓")}
    async function copy(){const feedback=el("preview-editor").value;if(!feedback)return;try{await navigator.clipboard.writeText(feedback)}catch{const area=document.createElement("textarea");area.value=feedback;area.style.position="fixed";area.style.opacity="0";document.body.append(area);area.select();document.execCommand("copy");area.remove()}const b=el("copy-button");b.textContent="已复制 ✓";setTimeout(()=>b.textContent="复制完整反馈",1600)}
    function reset(){["date","student","grade","content","study-status-note","mastery-note","absorption-note","output-note","observation-note","highlights","challenge-note","suggestion-note","homework","next-step-note"].forEach(id=>el(id).value="");state=emptyState();previewOverride=null;renderAll();notify("已清空全部内容")}
    function setTab(tab){document.querySelectorAll("[data-tab]").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));el("create-page").classList.toggle("hidden",tab!=="create");el("history-page").classList.toggle("hidden",tab!=="history");if(tab==="history")renderHistory();scrollTo({top:0,behavior:"smooth"})}
    function renderHistory(){el("record-count").textContent=records.length;const box=el("history-content");box.replaceChildren();if(!records.length){const empty=document.createElement("div");empty.className="empty";const b=document.createElement("b"),s=document.createElement("span"),go=document.createElement("button");b.textContent="还没有保存过反馈";s.textContent="完成第一份课堂记录后，它会出现在这里。";go.type="button";go.textContent="开始写反馈";go.addEventListener("click",()=>setTab("create"));empty.append(b,s,go);box.append(empty);return}const list=document.createElement("div");list.className="record-list";records.forEach(record=>{const item=document.createElement("button");item.type="button";item.className="record-item";const avatar=document.createElement("div");avatar.className="record-avatar";avatar.textContent=record.student?.slice(0,1)||"课";const info=document.createElement("div"),name=document.createElement("b"),meta=document.createElement("span"),summary=document.createElement("p"),go=document.createElement("i");name.textContent=record.student||"未命名反馈";meta.textContent=[formatDate(record.date),record.subject].filter(Boolean).join(" · ");summary.textContent=record.editedFeedback||record.content||buildFeedback(normalize(record)).replace(/\n/g," ").slice(0,80);go.textContent="继续编辑 →";info.append(name);if(meta.textContent)info.append(meta);info.append(summary);item.append(avatar,info,go);item.addEventListener("click",()=>loadRecord(record));list.append(item)});box.append(list)}
    function loadRecord(record){const r=normalize(record);["date","student","grade","content","study-status-note","mastery-note","absorption-note","output-note","observation-note","highlights","challenge-note","suggestion-note","homework","next-step-note"].forEach(id=>{const key=id.replace(/-([a-z])/g,(_,letter)=>letter.toUpperCase());el(id).value=r[key]||""});state={subject:r.subject,studyStatus:[...r.studyStatus],mastery:[...r.mastery],absorption:r.absorption,output:r.output,observations:[...r.observations],challenges:[...r.challenges],suggestions:[...r.suggestions],homeworkStandards:[...r.homeworkStandards],deadline:r.deadline,parentSupport:[...r.parentSupport],nextPlan:r.nextPlan,teacherFollowup:r.teacherFollowup};previewOverride=typeof r.editedFeedback==="string"?r.editedFeedback:null;renderAll();setTab("create");notify("已载入历史记录")}
    ["date","student","grade","content","study-status-note","mastery-note","absorption-note","output-note","observation-note","highlights","challenge-note","suggestion-note","homework","next-step-note"].forEach(id=>el(id).addEventListener("input",()=>{previewOverride=null;updatePreview()}));el("preview-editor").addEventListener("input",()=>{previewOverride=el("preview-editor").value;syncPreview(previewOverride)});el("today-button").addEventListener("click",()=>{el("date").value=today();previewOverride=null;updatePreview()});el("reset-button").addEventListener("click",reset);el("save-button").addEventListener("click",save);el("copy-button").addEventListener("click",copy);document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>setTab(b.dataset.tab)));renderAll();renderHistory();
  })();
