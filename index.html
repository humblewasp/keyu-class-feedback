<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="课语——帮助老师快速整理并生成课后反馈。">
  <title>课语｜课后反馈助手</title>
  <style>
    :root{--ink:#25302b;--muted:#77817b;--green:#315f4c;--green2:#e7efe9;--cream:#f5f1e8;--paper:#fffefa;--line:#ddd9ce;--orange:#d77b49}
    *{box-sizing:border-box}html{background:var(--cream);scroll-behavior:smooth}body{margin:0;color:var(--ink);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:radial-gradient(circle at 84% 8%,rgba(49,95,76,.08),transparent 25%),var(--cream)}button,input,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .topbar{height:76px;display:flex;align-items:center;padding:0 max(28px,calc((100vw - 1320px)/2));border-bottom:1px solid rgba(49,95,76,.15);background:rgba(245,241,232,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}.brand-mark{width:38px;height:38px;border-radius:50% 50% 50% 12px;background:var(--green);color:white;display:grid;place-items:center;font-family:serif;font-size:19px;margin-right:10px}.brand-copy{display:flex;flex-direction:column;line-height:1.1}.brand-copy strong{font-family:serif;font-size:18px;letter-spacing:.2em}.brand-copy span{color:var(--muted);font-size:10px;margin-top:5px;letter-spacing:.18em}.tabs{margin-left:auto;display:flex;gap:8px}.tabs button{border:0;background:transparent;color:#69736e;padding:9px 16px;border-radius:999px;font-weight:500}.tabs button.active{color:white;background:var(--green);box-shadow:0 5px 16px rgba(49,95,76,.18)}.tabs i{font-style:normal;font-size:10px;margin-left:4px;opacity:.75}
    .workspace,.history-page{max-width:1320px;padding:58px 28px 90px;margin:auto}.intro{display:flex;align-items:end;justify-content:space-between;margin-bottom:42px}.eyebrow{color:var(--orange);letter-spacing:.18em;font-size:11px;font-weight:700}h1{font-family:serif;font-size:42px;line-height:1.35;margin:12px 0 0;letter-spacing:.02em}.intro p{width:390px;color:var(--muted);line-height:1.9;font-size:14px;padding-bottom:7px}.editor-grid{display:grid;grid-template-columns:minmax(0,1.18fr) minmax(360px,.82fr);gap:28px;align-items:start}.form-card,.preview-card{background:rgba(255,254,250,.72);border:1px solid rgba(124,127,116,.2);box-shadow:0 18px 55px rgba(51,56,49,.06)}.form-card{padding:36px;border-radius:5px 28px 5px 28px}.section-heading{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}.section-heading>div{display:flex;align-items:center;gap:11px}.section-heading span{width:30px;height:30px;display:grid;place-items:center;border-radius:50%;border:1px solid #9eb2a7;color:var(--green);font-size:11px}h2{font-family:serif;font-size:19px;margin:0}.text-button{border:0;background:transparent;color:var(--muted);font-size:12px}.subheading{margin:38px 0 24px;padding-top:32px;border-top:1px dashed var(--line)}label{display:block;font-size:13px;font-weight:600;margin:0 0 9px}input,textarea{width:100%;border:1px solid var(--line);background:#fffefa;color:var(--ink);border-radius:10px;padding:13px 14px;outline:none;transition:.2s}input:focus,textarea:focus{border-color:#789886;box-shadow:0 0 0 3px rgba(49,95,76,.08)}textarea{resize:vertical;min-height:82px;line-height:1.7}.two-columns{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:23px}.chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:24px}.chips button{border:1px solid var(--line);background:#fffefa;border-radius:999px;padding:9px 19px;color:#69736e}.chips button.selected,.status-grid button.selected{background:var(--green2);color:var(--green);border-color:#789886;font-weight:600}.status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:25px}.status-grid button{border:1px solid var(--line);background:#fffefa;border-radius:10px;padding:12px 5px;color:#69736e}.status-grid b{margin-right:6px;font-size:16px;color:var(--orange)}.ability{padding:14px 0 18px}.ability-head{display:flex;align-items:center;justify-content:space-between}.ability-head label{margin:0}.ability-head span{font-size:12px;color:var(--green)}.scale{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:11px}.scale button{border:1px solid var(--line);background:#fffefa;color:#9ca39e;height:34px;border-radius:7px;font-size:12px}.scale button.filled{background:var(--green);border-color:var(--green);color:white}
    .preview-card{border-radius:28px 5px 28px 5px;padding:22px;position:sticky;top:98px}.preview-top{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);padding:2px 3px 17px}.preview-top>div{color:var(--green);font-weight:600}.live-dot{display:inline-block;width:7px;height:7px;background:#5b9d79;border-radius:50%;margin-right:7px;box-shadow:0 0 0 4px rgba(91,157,121,.13)}.paper{background:var(--paper);min-height:480px;padding:42px 38px;box-shadow:0 8px 25px rgba(57,55,47,.08);border:1px solid #ece7da;position:relative;overflow:hidden}.paper:after{content:"课语";position:absolute;right:-8px;bottom:-16px;font-family:serif;font-size:76px;color:rgba(49,95,76,.035);transform:rotate(-10deg)}.paper-date{color:var(--muted);font-size:11px;letter-spacing:.12em}.paper-title{font-family:serif;font-size:21px;margin-top:18px}.rule{height:2px;width:42px;background:var(--orange);margin:20px 0 24px}.paper-text{white-space:pre-line;color:#505b55;line-height:2;font-size:13px;margin:0;position:relative;z-index:1}.signature{color:#9a9d94;font-family:serif;font-size:12px;text-align:right;margin-top:34px}.actions{display:grid;grid-template-columns:.85fr 1.15fr;gap:10px;margin-top:18px}.actions button{height:46px;border-radius:10px;font-weight:600}.secondary{border:1px solid #9db0a4;color:var(--green);background:transparent}.primary{border:1px solid var(--green);color:white;background:var(--green);box-shadow:0 8px 20px rgba(49,95,76,.16)}button:disabled{opacity:.4;cursor:not-allowed}.privacy,.form-message{text-align:center;margin:13px 0 0;color:#979e99;font-size:10px}.form-message{min-height:16px;color:var(--orange);font-size:12px}.history-page{max-width:900px}.history-page>p{color:var(--muted);margin:10px 0 32px}.empty{padding:70px 24px;display:flex;flex-direction:column;align-items:center;background:rgba(255,254,250,.65);border:1px dashed #bbc3bc;border-radius:18px}.empty b{font-family:serif;font-size:20px}.empty span{color:var(--muted);margin:10px 0 24px;font-size:13px}.empty button{background:var(--green);color:#fff;border:0;padding:11px 22px;border-radius:999px}.record-list{display:flex;flex-direction:column;gap:12px}.record-item{width:100%;text-align:left;display:grid;grid-template-columns:48px 1fr auto;gap:15px;align-items:center;padding:18px;border:1px solid var(--line);border-radius:14px;background:#fffefa;color:var(--ink)}.record-avatar{width:44px;height:44px;border-radius:50%;background:var(--green2);color:var(--green);display:grid;place-items:center;font-family:serif;font-size:18px}.record-item b,.record-item span,.record-item p{display:block}.record-item span{color:var(--muted);font-size:11px;margin:4px 0 6px}.record-item p{margin:0;color:#65706a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:520px}.record-item i{font-style:normal;color:var(--green);font-size:12px}.site-footer{max-width:1320px;margin:0 auto;padding:0 28px 28px;text-align:center;color:#8d958f;font-size:11px;letter-spacing:.02em}.site-footer a{color:var(--green);text-decoration:none}.site-footer a:hover{text-decoration:underline}
    @media(max-width:850px){.workspace,.history-page{padding:34px 16px 70px}.intro{display:block;margin-bottom:26px}.intro p{width:auto;margin-top:18px}h1{font-size:32px}.editor-grid{grid-template-columns:1fr}.preview-card{position:static}.form-card{padding:24px 18px}.site-footer{padding:0 16px 24px;line-height:1.7}}@media(max-width:560px){.topbar{padding:0 14px}.brand-copy span{display:none}.tabs button{padding:8px 10px;font-size:12px}.two-columns{grid-template-columns:1fr}.status-grid{grid-template-columns:1fr 1fr}.paper{padding:32px 25px;min-height:430px}.record-item{grid-template-columns:42px 1fr}.record-item i{display:none}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand-mark">课</div><div class="brand-copy"><strong>课语</strong><span>课后反馈助手</span></div>
    <nav class="tabs" aria-label="主导航"><button type="button" class="active" data-tab="create">写反馈</button><button type="button" data-tab="history">历史记录 <i id="record-count">0</i></button></nav>
  </header>
  <main>
    <section id="create-page" class="workspace">
      <div class="intro"><div><span class="eyebrow">AFTER-CLASS NOTE</span><h1>把课堂观察，<br>变成有温度的反馈。</h1></div><p>填写课堂要点，系统会自动整理成一份清晰、专业、适合直接发给家长的课后反馈。</p></div>
      <div class="editor-grid">
        <form id="feedback-form" class="form-card" novalidate>
          <div class="section-heading"><div><span>01</span><h2>基本信息</h2></div><button type="button" id="reset-button" class="text-button">清空重写</button></div>
          <div class="two-columns"><label>上课日期<input id="date" name="date" type="date"></label><label>学生姓名<input id="student" name="student" placeholder="请输入学生姓名" autocomplete="off"></label></div>
          <label>学习科目</label><div id="subjects" class="chips" role="group" aria-label="学习科目"></div>
          <label>本节课学习内容<textarea id="content" name="content" rows="3" placeholder="例如：分数的加减法、通分方法与典型例题……"></textarea></label>
          <div class="section-heading subheading"><div><span>02</span><h2>课堂表现</h2></div></div>
          <label>学生今天的状态</label><div id="statuses" class="status-grid" role="group" aria-label="学生状态"></div>
          <div class="ability"><div class="ability-head"><label>信息接收能力</label><span id="reception-text"></span></div><div id="reception-scale" class="scale" role="group" aria-label="信息接收能力"></div></div>
          <div class="ability"><div class="ability-head"><label>表达 / 输出能力</label><span id="expression-text"></span></div><div id="expression-scale" class="scale" role="group" aria-label="表达输出能力"></div></div>
          <label>课堂亮点或需要关注的地方<textarea id="highlights" name="highlights" rows="3" placeholder="例如：今天主动举手回答了两次；计算步骤需要再细心一些……"></textarea></label>
          <div class="section-heading subheading"><div><span>03</span><h2>课后作业</h2></div></div>
          <label>作业内容<textarea id="homework" name="homework" rows="3" placeholder="例如：练习册第 18—19 页；背诵课文第三段……"></textarea></label>
        </form>
        <aside class="preview-card"><div class="preview-top"><div><span class="live-dot"></span>实时预览</div><span id="char-count">0 字</span></div><div class="paper"><div id="paper-date" class="paper-date"></div><div id="paper-title" class="paper-title"></div><div class="rule"></div><p id="paper-text" class="paper-text"></p><div class="signature">— 认真记录每一次进步</div></div><div class="actions"><button type="button" id="save-button" class="secondary" disabled>保存记录</button><button type="button" id="copy-button" class="primary">复制并发送</button></div><p id="form-message" class="form-message" aria-live="polite"></p><p class="privacy">记录仅保存在当前设备，不会上传学生信息</p></aside>
      </div>
    </section>
    <section id="history-page" class="history-page hidden"><span class="eyebrow">SAVED NOTES</span><h1>历史反馈</h1><p>点击一条记录即可继续编辑或再次发送。</p><div id="history-content"></div></section>
  </main>
  <footer class="site-footer">本网站版权归小黄老师所有 · 如有问题请联系：<a href="mailto:huang030225@gmail.com">huang030225@gmail.com</a></footer>
  <script>
    (()=>{
      const subjects=["数学","语文","英语","物理","化学","其他"],statuses=["专注投入","状态良好","略显疲惫","需要鼓励"],statusIcons=["◎","◒","◔","◇"],abilityTexts=["需要重点引导","需要多次提示","基本能够跟上","理解与反馈较好","反应迅速、表现突出"],storageKey="class-feedback-records";
      const el=id=>document.getElementById(id);let state={subject:"数学",studyStatus:"专注投入",reception:4,expression:4},records=loadRecords();
      function today(){const d=new Date(),offset=d.getTimezoneOffset()*60000;return new Date(d-offset).toISOString().slice(0,10)}
      function formatDate(v){if(!v)return"今天";const [y,m,d]=v.split("-");return `${y}年${Number(m)}月${Number(d)}日`}
      function abilityText(v){return abilityTexts[v-1]}
      function formData(){return{date:el("date").value,student:el("student").value,subject:state.subject,content:el("content").value,studyStatus:state.studyStatus,reception:state.reception,expression:state.expression,highlights:el("highlights").value,homework:el("homework").value}}
      function buildFeedback(f){const name=f.student.trim()||"孩子",content=f.content.trim()||"本节课计划内容",homework=f.homework.trim()||"复习本节课知识点，并完成配套练习",highlight=f.highlights.trim()?`值得肯定的是：${f.highlights.trim()}。`:"课堂中能够配合老师完成学习任务。";return `【${name} · ${f.subject}课后反馈】\n日期：${formatDate(f.date)}\n\n今天主要学习了${content}。${name}整体状态${f.studyStatus}，课堂参与度良好。\n\n信息接收方面：${abilityText(f.reception)}；表达与输出方面：${abilityText(f.expression)}。${highlight}\n\n课后作业：${homework}。建议按时完成，并将不确定的地方做好标记，下次课我们会针对性讲解。`}
      function loadRecords(){try{return JSON.parse(localStorage.getItem(storageKey)||"[]")}catch{return[]}}
      function renderChoice(container,items,current,click,icons=[]){container.replaceChildren(...items.map((item,i)=>{const b=document.createElement("button");b.type="button";b.className=item===current?"selected":"";if(icons[i]){const strong=document.createElement("b");strong.textContent=icons[i];b.append(strong)}b.append(document.createTextNode(item));b.addEventListener("click",()=>click(item));return b}))}
      function renderScale(container,value,label,click){container.replaceChildren(...[1,2,3,4,5].map(score=>{const b=document.createElement("button");b.type="button";b.textContent=score;b.className=score<=value?"filled":"";b.setAttribute("aria-label",`${label} ${score}分`);b.addEventListener("click",()=>click(score));return b}))}
      function renderControls(){renderChoice(el("subjects"),subjects,state.subject,v=>{state.subject=v;renderControls();updatePreview()});renderChoice(el("statuses"),statuses,state.studyStatus,v=>{state.studyStatus=v;renderControls();updatePreview()},statusIcons);renderScale(el("reception-scale"),state.reception,"信息接收能力",v=>{state.reception=v;renderControls();updatePreview()});renderScale(el("expression-scale"),state.expression,"表达输出能力",v=>{state.expression=v;renderControls();updatePreview()});el("reception-text").textContent=abilityText(state.reception);el("expression-text").textContent=abilityText(state.expression)}
      function updatePreview(){const f=formData(),text=buildFeedback(f);el("paper-date").textContent=formatDate(f.date);el("paper-title").textContent=`${f.student||"学生姓名"} · ${f.subject}课后反馈`;el("paper-text").textContent=text;el("char-count").textContent=`${text.length} 字`;el("save-button").disabled=!(f.student.trim()&&f.content.trim())}
      function showMessage(msg){el("form-message").textContent=msg;window.clearTimeout(showMessage.timer);showMessage.timer=window.setTimeout(()=>el("form-message").textContent="",1800)}
      function save(){const f=formData();if(!f.student.trim()||!f.content.trim()){showMessage("请先填写学生姓名和学习内容");return}records=[{...f,id:Date.now(),createdAt:new Date().toISOString()},...records].slice(0,30);localStorage.setItem(storageKey,JSON.stringify(records));renderHistory();showMessage("已保存到当前设备 ✓")}
      async function copy(){const text=buildFeedback(formData());try{await navigator.clipboard.writeText(text)}catch{const area=document.createElement("textarea");area.value=text;area.style.position="fixed";area.style.opacity="0";document.body.append(area);area.select();document.execCommand("copy");area.remove()}const b=el("copy-button");b.textContent="已复制 ✓";window.setTimeout(()=>b.textContent="复制并发送",1600)}
      function reset(){el("feedback-form").reset();el("date").value=today();state={subject:"数学",studyStatus:"专注投入",reception:4,expression:4};renderControls();updatePreview();showMessage("已清空")}
      function setTab(tab){document.querySelectorAll("[data-tab]").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));el("create-page").classList.toggle("hidden",tab!=="create");el("history-page").classList.toggle("hidden",tab!=="history");if(tab==="history")renderHistory();window.scrollTo({top:0,behavior:"smooth"})}
      function renderHistory(){el("record-count").textContent=records.length;const box=el("history-content");box.replaceChildren();if(!records.length){const empty=document.createElement("div");empty.className="empty";const b=document.createElement("b");b.textContent="还没有保存过反馈";const s=document.createElement("span");s.textContent="完成第一份课堂记录后，它会出现在这里。";const btn=document.createElement("button");btn.type="button";btn.textContent="开始写反馈";btn.addEventListener("click",()=>setTab("create"));empty.append(b,s,btn);box.append(empty);return}const list=document.createElement("div");list.className="record-list";records.forEach(record=>{const btn=document.createElement("button");btn.type="button";btn.className="record-item";const avatar=document.createElement("div");avatar.className="record-avatar";avatar.textContent=record.student.slice(0,1);const info=document.createElement("div"),name=document.createElement("b"),meta=document.createElement("span"),content=document.createElement("p"),go=document.createElement("i");name.textContent=record.student;meta.textContent=`${formatDate(record.date)} · ${record.subject}`;content.textContent=record.content;go.textContent="继续编辑 →";info.append(name,meta,content);btn.append(avatar,info,go);btn.addEventListener("click",()=>loadRecord(record));list.append(btn)});box.append(list)}
      function loadRecord(r){el("date").value=r.date;el("student").value=r.student;el("content").value=r.content;el("highlights").value=r.highlights;el("homework").value=r.homework;state={subject:r.subject,studyStatus:r.studyStatus,reception:Number(r.reception),expression:Number(r.expression)};renderControls();updatePreview();setTab("create");showMessage("已载入历史记录")}
      el("date").value=today();["date","student","content","highlights","homework"].forEach(id=>el(id).addEventListener("input",updatePreview));document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>setTab(b.dataset.tab)));el("reset-button").addEventListener("click",reset);el("save-button").addEventListener("click",save);el("copy-button").addEventListener("click",copy);renderControls();renderHistory();updatePreview();
    })();
  </script>
</body>
</html>
